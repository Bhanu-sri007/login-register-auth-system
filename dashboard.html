<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1d2671, #c33764);
      font-family: Arial, sans-serif;
    }

    .dashboard {
      background: rgba(255,255,255,0.15);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      text-align: center;
      color: white;
      width: 350px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 25px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #ff4b5c;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff1e38;
    }

  </style>
</head>

<body>

  <div class="dashboard">

    <h1>Welcome 👋</h1>

    <p id="userEmail"></p>

    <button onclick="logout()">Logout</button>

  </div>

  <script>

    const email = localStorage.getItem("userEmail");

    document.getElementById("userEmail").innerText = email;

    function logout() {

      localStorage.removeItem("userEmail");

      window.location.href = "index.html";
    }

  </script>

</body>
</html>
